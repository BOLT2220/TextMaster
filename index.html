<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://pl29207529.profitablecpmratenetwork.com/92/b1/08/92b1081886da72458aea461ea3b71eed.js"></script>
<script src="https://pl29168791.profitablecpmratenetwork.com/92/4d/3a/924d3ab7e19831c9267c1c60bcacc96b.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMaster // GenZ Edition</title>
    <script src="https://pl29168791.profitablecpmratenetwork.com/92/4d/3a/924d3ab7e19831c9267c1c60bcacc96b.js"></script>

    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #00ff88; /* Neon Green Aura */
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .bento-grid {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto auto auto;
            gap: 16px;
        }

        /* Hero Area */
        .card-main {
            grid-column: span 4;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .card-main::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        h1 { 
            font-size: 32px; 
            letter-spacing: -1px; 
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            resize: none;
            outline: none;
            margin-top: 10px;
            font-family: inherit;
        }

        /* Stats Cards */
        .stat-card {
            grid-column: span 2;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .stat-val { font-size: 24px; font-weight: 800; color: var(--accent); display: block; }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Action Buttons */
        .btn-grid {
            grid-column: span 4;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        button {
            background: #111;
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        button:hover {
            background: var(--text-main);
            color: var(--bg);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border: none;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            background: #00e67a;
        }

        /* Footer */
        .footer {
            grid-column: span 4;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 10px;
        }

        /* Mobile Fix */
        @media (max-width: 600px) {
            .stat-card { grid-column: span 4; }
        }
    </style>
</head>
<body>

<div class="bento-grid">
    <!-- Main Input Section -->
    <div class="card-main">
        <h1>TextMaster.exe</h1>
        <textarea id="userInput" placeholder="Drop your thoughts or paste cringe text here..." oninput="calculate()"></textarea>
    </div>

    <!-- Stats Section -->
    <div class="stat-card">
        <span class="stat-val" id="wordCount">0</span>
        <span class="stat-label">Words</span>
    </div>
    <div class="stat-card">
        <span class="stat-val" id="charCount">0</span>
        <span class="stat-label">Characters</span>
    </div>

    <!-- Action Section -->
    <div class="btn-grid">
        <button onclick="handle('up')">UPPERCASE</button>
        <button onclick="handle('low')">lowercase</button>
        <button onclick="handle('title')">Title Case</button>
        <button onclick="handle('clean')">Clean Space</button>
        <button class="btn-primary" onclick="copy()">Copy Text ⚡</button>
        <button style="border-color: #331111; color: #ff4444;" onclick="clearAll()">Reset</button>
    </div>

    <div class="footer">
        NO COOKIES. NO TRACKING. JUST VIBES.
    </div>
</div>

<script>
    const input = document.getElementById('userInput');
    
    function calculate() {
        const text = input.value.trim();
        document.getElementById('wordCount').innerText = text ? text.split(/\s+/).length : 0;
        document.getElementById('charCount').innerText = input.value.length;
    }

    function handle(mode) {
        let str = input.value;
        if(mode === 'up') str = str.toUpperCase();
        if(mode === 'low') str = str.toLowerCase();
        if(mode === 'title') str = str.replace(/\b\w/g, l => l.toUpperCase());
        if(mode === 'clean') str = str.replace(/\s+/g, ' ').trim();
        
        input.value = str;
        calculate();
    }

    async function copy() {
        await navigator.clipboard.writeText(input.value);
        const btn = document.querySelector('.btn-primary');
        btn.innerText = "Copied! ✨";
        setTimeout(() => btn.innerText = "Copy Text ⚡", 2000);
    }

    function clearAll() {
        input.value = '';
        calculate();
    }
</script>

</body>
</html>
